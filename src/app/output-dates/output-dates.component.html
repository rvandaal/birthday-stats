<table class="table table-sm" style="margin: 30px; width: 80%">
  <thead>
    <tr>
      <th scope="col">Datum</th>
      <th scope="col">Gebeurtenis</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let gebeurtenis of gebeurtenissen">
      <th scope="row">{{gebeurtenis.datum}}</th>
      <td>{{gebeurtenis.info}}</td>
    </tr>
  </tbody>
</table>
